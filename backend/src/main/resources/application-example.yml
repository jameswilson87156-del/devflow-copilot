server:
  port: 8080

spring:
  application:
    name: devflow-copilot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/devflow_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: your_mysql_username
    password: your_mysql_password

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

devflow:
  ai:
    provider: local-rule
    model-name: local-rule-mvp
