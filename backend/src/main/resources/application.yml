server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: devflow-copilot
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

devflow:
  ai:
    provider: ${DEVFLOW_AI_PROVIDER:local-rule}
    base-url: ${DEVFLOW_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${DEVFLOW_AI_API_KEY:}
    model: ${DEVFLOW_AI_MODEL:gpt-4.1-mini}
    timeout-seconds: ${DEVFLOW_AI_TIMEOUT_SECONDS:60}
    max-tokens: ${DEVFLOW_AI_MAX_TOKENS:2048}
    fallback-to-local: ${DEVFLOW_AI_FALLBACK_TO_LOCAL:true}
