spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/devflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

devflow:
  ai:
    provider: ${DEVFLOW_AI_PROVIDER:local-rule}
