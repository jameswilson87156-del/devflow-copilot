services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: devflow_copilot
      MYSQL_USER: devflow
      MYSQL_PASSWORD: ${DB_PASSWORD:-devflow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devflow-root}
    ports:
      - "3306:3306"
    volumes:
      - devflow-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-devflow-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devflow_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: devflow
      DB_PASSWORD: ${DB_PASSWORD:-devflow}
      DEVFLOW_AI_PROVIDER: ${DEVFLOW_AI_PROVIDER:-local-rule}
      DEVFLOW_AI_BASE_URL: ${DEVFLOW_AI_BASE_URL:-https://api.openai.com/v1}
      DEVFLOW_AI_API_KEY: ${DEVFLOW_AI_API_KEY:-}
      DEVFLOW_AI_MODEL: ${DEVFLOW_AI_MODEL:-gpt-4.1-mini}
      DEVFLOW_AI_FALLBACK_TO_LOCAL: ${DEVFLOW_AI_FALLBACK_TO_LOCAL:-true}
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  devflow-mysql-data:
